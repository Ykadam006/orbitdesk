services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbitdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orbitdesk
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_URL: http://localhost:3000
      CLIENT_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orbitdesk
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      CLIENT_URL: http://localhost:3000
      SOCKET_PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
